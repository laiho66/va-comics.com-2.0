    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <div class="bunker-bg-overlay"></div>

    <button class="mobile-bunker-toggle" onclick="toggleMobileMenu()">
        [ = ] SYS_MENU
    </button>

    <div class="os-container">
        
        <nav class="sidebar-nav" id="globalNav">
            <ul class="main-menu">
                
                <li class="menu-item active">
                    <a href="index.html" class="nav-link">
                        <span class="node-num">[01]</span> HOME
                    </a>
                </li>

                <li class="menu-item has-dropdown" onclick="toggleMobileDropdown(this, event)">
                    <a href="projects.html" class="nav-link">
                        <span class="node-num">[02]</span> PROJECTS
                    </a>
                    <ul class="dropdown-level-1">
                        <li class="dropdown-item has-sub-dropdown" onclick="toggleMobileSubDropdown(this, event)">
                            <a href="deaddrop/index.html">> DEAD DROP</a>
                            <ul class="dropdown-level-2">
                                <li><a href="deaddrop/vol1.html">» VOL 1 (ISSUES 1-8)</a></li>
                                <li><a href="deaddrop/vol2.html">» VOL 2 (ISSUES 9-12+)</a></li>
                            </ul>
                        </li>
                    </ul>
                </li>

                <li class="menu-item">
                    <a href="chronicles.html" class="nav-link">
                        <span class="node-num">[03]</span> CHRONICLES
                    </a>
                </li>

                <li class="menu-item">
                    <a href="media.html" class="nav-link">
                        <span class="node-num">[04]</span> MEDIA
                    </a>
                </li>

                <li class="menu-item">
                    <a href="about.html" class="nav-link">
                        <span class="node-num">[05]</span> ABOUT US
                    </a>

                    <a href="contact.html" class="nav-link">
                        <span class="node-num">[06]</span> CONTACT
                    </a>
                </li>
            </ul>
        </nav>
		
        <footer class="bunker-footer">
            <div class="hud-status-bar">
                <span class="status-indicator"></span> // SYS_STATUS: OPERATIONAL [MAGMA_ACTIVE]
            </div>
            
            <div class="legal-bindings">
                <a href="terms.html" class="legal-link">// LEGAL_BINDINGS</a>
                <a href="privacy.html" class="legal-link">// DATA_ENCRYPTION_POLICY</a>
                <a href="cookies.html" class="legal-link">// SIGNAL_TRACKING_PROTOCOL</a>
            </div>
        </footer>

    </div>

    <script>
        // 1. STRATIFIED PARALLAX DEPTH (Desktop)
        const bg = document.querySelector('.bunker-bg-overlay');
        const sidebar = document.querySelector('.sidebar-nav');
        
        if (window.matchMedia("(min-width: 1024px)").matches) {
            window.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX / window.innerWidth - 0.5;
                const mouseY = e.clientY / window.innerHeight - 0.5;
                
                bg.style.transform = `translate(${mouseX * -20}px, ${mouseY * -20}px)`;
                sidebar.style.transform = `translate(${mouseX * 10}px, ${mouseY * 10}px)`;
                sidebar.style.transition = "transform 0.1s ease-out";
            });
        }

        // 2. MOBILE HAMBURGER TERMINAL OVERLAY
        function toggleMobileMenu() {
            const nav = document.getElementById('globalNav');
            const toggleBtn = document.querySelector('.mobile-bunker-toggle');
            nav.classList.toggle('mobile-open');
            
            if(nav.classList.contains('mobile-open')) {
                toggleBtn.textContent = "[ X ] CLOSE_MENU";
                toggleBtn.style.color = "#FF4500";
            } else {
                toggleBtn.textContent = "[ = ] SYS_MENU";
                toggleBtn.style.color = "#ffffff";
            }
        }

        // 3. LOGICĂ TAP DROPDOWN PENTRU MOBIL
        function toggleMobileDropdown(element, event) {
            if (window.innerWidth < 1024) {
                // Prevenim navigarea instantă pe projects.html doar la primul tap pe mobil
                if (event.target.classList.contains('nav-link') || event.target.parentElement.classList.contains('nav-link')) {
                    event.preventDefault();
                }
                element.classList.toggle('open');
            }
        }

        function toggleMobileSubDropdown(element, event) {
            if (window.innerWidth < 1024) {
                event.stopPropagation(); // Oprim închiderea meniului părinte
                event.preventDefault();
                element.classList.toggle('open');
            }
        }
    </script>
</body>
</html>
