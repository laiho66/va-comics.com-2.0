<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Comics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <div class="bunker-bg-overlay"></div>

    <button class="mobile-bunker-toggle">
        [ = ] SYS_MENU
    </button>

    <div class="os-container">
        
        <nav class="sidebar-nav" id="globalNav">
            <ul class="main-menu">
                
                <li class="menu-item active">
                    <a href="index.html" class="nav-link">
                        <span class="node-num">[01]</span> HOME
                    </a>
                </li>

                <li class="menu-item has-dropdown">
                    <a href="projects.html" class="nav-link">
                        <span class="node-num">[02]</span> PROJECTS
                    </a>
                    <ul class="dropdown-level-1">
                        <li class="dropdown-item has-sub-dropdown">
                            <a href="deaddrop/index.html" class="sub-nav-link">> DEAD DROP</a>
                            <ul class="dropdown-level-2">
                                <li><a href="deaddrop/vol1.html" class="vol-link">» VOL 1 (ISSUES 1-8)</a></li>
                                <li><a href="deaddrop/vol2.html" class="vol-link">» VOL 2 (ISSUES 9-12+)</a></li>
                            </ul>
                        </li>
                    </ul>
                </li>

                <li class="menu-item">
                    <a href="chronicles.html" class="nav-link">
                        <span class="node-num">[03]</span> CHRONICLES
                    </a>
                </li>

                <li class="menu-item">
                    <a href="media.html" class="nav-link">
                        <span class="node-num">[04]</span> MEDIA
                    </a>
                </li>

                <li class="menu-item">
                    <a href="about.html" class="nav-link">
                        <span class="node-num">[05]</span> ABOUT US
                    </a>
                </li>

                <li class="menu-item">
                    <a href="contact.html" class="nav-link">
                        <span class="node-num">[06]</span> CONTACT
                    </a>
                </li>
            </ul>
        </nav>
        
        <footer class="bunker-footer">
            <div class="hud-status-bar">
                <span class="status-indicator"></span> // SYS_STATUS: OPERATIONAL [MAGMA_ACTIVE]
            </div>
            
            <div class="legal-bindings">
                <a href="terms.html" class="legal-link">// LEGAL_BINDINGS</a>
                <a href="privacy.html" class="legal-link">// DATA_ENCRYPTION_POLICY</a>
                <a href="cookies.html" class="legal-link">// SIGNAL_TRACKING_PROTOCOL</a>
            </div>
        </footer>

    </div>

    <script>
        // 1. STRATIFIED PARALLAX DEPTH (Desktop)
        const bg = document.querySelector('.bunker-bg-overlay');
        const sidebar = document.querySelector('.sidebar-nav');
        
        if (window.matchMedia("(min-width: 1024px)").matches) {
            window.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX / window.innerWidth - 0.5;
                const mouseY = e.clientY / window.innerHeight - 0.5;
                
                bg.style.transform = `translate(${mouseX * -20}px, ${mouseY * -20}px)`;
                sidebar.style.transform = `translate(${mouseX * 10}px, ${mouseY * 10}px)`;
                sidebar.style.transition = "transform 0.1s ease-out";
            });
        }

        // CONTROL INTEGRAT PENTRU INTERFAȚA DE MOBIL
        const nav = document.getElementById('globalNav');
        const toggleBtn = document.querySelector('.mobile-bunker-toggle');

        // Toggle Meniu Principal
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            nav.classList.toggle('mobile-open');
            
            if(nav.classList.contains('mobile-open')) {
                toggleBtn.textContent = "[ X ] CLOSE_MENU";
                toggleBtn.style.color = "#FF4500";
            } else {
                toggleBtn.textContent = "[ = ] SYS_MENU";
                toggleBtn.style.color = "#ffffff";
                // Închide toate sub-meniurile când se închide meniul mare
                document.querySelectorAll('.menu-item, .dropdown-item').forEach(el => el.classList.remove('open'));
            }
        });

        // Închidere la click în exterior (Click Outside)
        document.addEventListener('click', (e) => {
            if (window.innerWidth < 1024 && nav.classList.contains('mobile-open')) {
                // Dacă click-ul NU este în interiorul navigării și NU pe butonul de toggle
                if (!nav.contains(e.target) && !toggleBtn.contains(e.target)) {
                    nav.classList.remove('mobile-open');
                    toggleBtn.textContent = "[ = ] SYS_MENU";
                    toggleBtn.style.color = "#ffffff";
                    document.querySelectorAll('.menu-item, .dropdown-item').forEach(el => el.classList.remove('open'));
                }
            }
        });

        // Logică separată pentru Dropdown-uri pe Mobil (Fără conflicte de propagation)
        nav.addEventListener('click', (e) => {
            if (window.innerWidth >= 1024) return; // Pe desktop ignorăm logica asta

            const target = e.target;

            // 1. Gestiune nod principal: [02] PROJECTS
            if (target.closest('.has-dropdown') && !target.closest('.dropdown-level-1')) {
                // Dacă se apasă pe link-ul principal de Projects, blocăm navigarea ca să deschidem meniul
                if (target.classList.contains('nav-link') || target.parentElement.classList.contains('nav-link')) {
                    e.preventDefault();
                    target.closest('.has-dropdown').classList.toggle('open');
                }
            }

            // 2. Gestiune sub-nod: > DEAD DROP
            if (target.closest('.has-sub-dropdown')) {
                // Dacă degetul lovește exact textul sau link-ul "> DEAD DROP"
                if (target.classList.contains('sub-nav-link') || target.tagName === 'A' && !target.classList.contains('vol-link')) {
                    e.preventDefault();
                    e.stopPropagation();
                    target.closest('.has-sub-dropdown').classList.toggle('open');
                }
            }
            
            // NOTE: Link-urile care au clasa '.vol-link' (VOL 1 / VOL 2) nu sunt interceptate de regulile de mai sus,
            // așa că browser-ul le va executa nativ și va schimba pagina instant!
        });
    </script>
</body>
</html>
